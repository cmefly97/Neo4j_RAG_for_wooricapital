", "conf": "EXTRACTED"}, {"s": "credit_relief_product", "t": "css_screening", "r": "governs", "conf": "EXTRACTED"}, {"s": "gl_rate", "t": "nego_adjustment_rate", "r": "has_property", "conf": "EXTRACTED"}, {"s": "css_screening", "t": "individual_rehabilitation", "r": "has_class", "conf": "EXTRACTED"}, {"s": "individual_business_criteria", "t": "individual_rehabilitation", "r": "semantically_similar_to", "conf": "AMBIGUOUS"}, {"s": "used_lease_screening_criteria", "t": "eligible_customer", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_lease_screening_criteria", "t": "ineligible_customer", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_lease_screening_criteria", "t": "eligible_vehicle_type", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_lease_screening_criteria", "t": "vehicle_price_criteria", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_lease_screening_criteria", "t": "carhistory_criteria", "r": "references", "conf": "EXTRACTED"}, {"s": "used_lease_screening_criteria", "t": "physical_vehicle_verification", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_lease_screening_criteria", "t": "no_license_handling", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_lease_screening_criteria", "t": "credit_drop_handling", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_lease_screening_criteria", "t": "sound_asset_building", "r": "rationale_for", "conf": "EXTRACTED"}, {"s": "used_lease_screening_criteria", "t": "rental_car_exclusion", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_lease_screening_criteria", "t": "lease_post_management", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_lease_screening_criteria", "t": "used_passenger_screening_criteria", "r": "semantically_similar_to", "conf": "INFERRED"}, {"s": "used_passenger_screening_criteria", "t": "eligible_customer", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_passenger_screening_criteria", "t": "ineligible_customer", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_passenger_screening_criteria", "t": "eligible_vehicle_type", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_passenger_screening_criteria", "t": "vehicle_price_criteria", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_passenger_screening_criteria", "t": "ltv_criteria", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_passenger_screening_criteria", "t": "loan_limit_cap", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_passenger_screening_criteria", "t": "carhistory_criteria", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_passenger_screening_criteria", "t": "physical_vehicle_verification", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_passenger_screening_criteria", "t": "collateral_setup_criteria", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_passenger_screening_criteria", "t": "approval_authority_limit", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_passenger_screening_criteria", "t": "no_license_handling", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_passenger_screening_criteria", "t": "loan_disbursement_criteria", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_passenger_screening_criteria", "t": "credit_drop_handling", "r": "has_property", "conf": "EXTRACTED"}, {"s": "used_passenger_screening_criteria", "t": "sound_asset_building", "r": "rationale_for", "conf": "EXTRACTED"}, {"s": "ineligible_customer", "t": "jabis_system", "r": "shares_data_with", "conf": "EXTRACTED"}, {"s": "eligible_vehicle_type", "t": "medium_commercial_vehicle", "r": "has_property", "conf": "EXTRACTED"}, {"s": "vehicle_price_criteria", "t": "db_market_price", "r": "references", "conf": "EXTRACTED"}, {"s": "ltv_criteria", "t": "credit_score", "r": "references", "conf": "EXTRACTED"}, {"s": "ltv_criteria", "t": "used_car_practice_guideline", "r": "references", "conf": "EXTRACTED"}, {"s": "credit_score", "t": "loan_limit_cap", "r": "references", "conf": "EXTRACTED"}, {"s": "loan_limit_cap", "t": "repayment_ability", "r": "references", "conf": "EXTRACTED"}, {"s": "loan_limit_cap", "t": "system_auto_approval", "r": "references", "conf": "EXTRACTED"}, {"s": "approval_authority_limit", "t": "loan_disbursement_criteria", "r": "references", "conf": "EXTRACTED"}, {"s": "system_auto_approval", "t": "no_license_handling", "r": "references", "conf": "EXTRACTED"}], "comm": {"0": "전결권·채권확보·카히스토리", "1": "신용회복·CSS·듀얼상품", "2": "잔가율표·개인사업자/회생 한도", "3": "NEGO·운용리스 IRR·취급제한", "4": "오토운영팀 에이전트·챗봇", "5": "신용평점·LTV·상환능력 한도", "6": "금융리스 금리등급"}};
const COLORS = ["#ff7b72","#79c0ff","#56d364","#d2a8ff","#ffa657","#f2cc60","#39c5cf","#ff9bce","#a5d6ff"];
const comm = DATA.comm;
const nodes = DATA.nodes.map(n=>({...n, x:0,y:0,vx:0,vy:0, r:5+Math.sqrt(n.d)*3.2}));
const idx = new Map(nodes.map((n,i)=>[n.id,i]));
const links = DATA.links.map(l=>({source:idx.get(l.s),target:idx.get(l.t),r:l.r,conf:l.conf})).filter(l=>l.source!=null&&l.target!=null);

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const stage = document.getElementById('stage'), tip = document.getElementById('tip');
let W=0,H=0,DPR=Math.min(devicePixelRatio||1,2);
let view={x:0,y:0,k:1}, dragNode=null, panning=false, last={x:0,y:0}, hoverNode=null, query="";

function resize(){
  W=stage.clientWidth; H=stage.clientHeight;
  cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
new ResizeObserver(resize).observe(stage); resize();

// init positions: cluster by community on a circle
const cset=[...new Set(nodes.map(n=>n.c))];
nodes.forEach(n=>{
  const ci=cset.indexOf(n.c), a=ci/cset.length*2*Math.PI;
  n.x=Math.cos(a)*180 + (Math.random()-.5)*120;
  n.y=Math.sin(a)*180 + (Math.random()-.5)*120;
});

// force simulation
let alpha=1;
function step(){
  alpha*=0.992; if(alpha<0.02) alpha=0.02;
  // repulsion
  for(let i=0;i<nodes.length;i++){
    const a=nodes[i];
    for(let j=i+1;j<nodes.length;j++){
      const b=nodes[j];
      let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy+0.01;
      let f=(900)/d2; let d=Math.sqrt(d2);
      let fx=dx/d*f, fy=dy/d*f;
      a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
    }
  }
  // springs
  for(const l of links){
    const a=nodes[l.source],b=nodes[l.target];
    let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)+0.01;
    let f=(d-70)*0.02;
    let fx=dx/d*f, fy=dy/d*f;
    a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
  }
  // same-community gravity + center
  for(const n of nodes){
    n.vx-=n.x*0.002; n.vy-=n.y*0.002;
    if(n===dragNode) continue;
    n.x+=n.vx*alpha; n.y+=n.vy*alpha;
    n.vx*=0.85; n.vy*=0.85;
  }
  draw();
  requestAnimationFrame(step);
}

function toScreen(n){return {x:(n.x*view.k)+view.x+W/2, y:(n.y*view.k)+view.y+H/2};}
function fromScreen(px,py){return {x:(px-view.x-W/2)/view.k, y:(py-view.y-H/2)/view.k};}

function draw(){
  ctx.clearRect(0,0,W,H);
  // edges
  for(const l of links){
    const a=toScreen(nodes[l.source]), b=toScreen(nodes[l.target]);
    const dashed = l.conf!=='EXTRACTED';
    const hot = hoverNode && (l.source===hoverNode||l.target===hoverNode);
    ctx.beginPath();
    ctx.setLineDash(dashed?[3,3]:[]);
    ctx.strokeStyle = hot? 'rgba(230,237,243,.85)' : (dashed?'rgba(139,148,158,.35)':'rgba(139,148,158,.22)');
    ctx.lineWidth = hot?1.6:1;
    ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  ctx.setLineDash([]);
  // nodes
  for(let i=0;i<nodes.length;i++){
    const n=nodes[i], p=toScreen(n), col=COLORS[n.c%COLORS.length];
    const match = query && n.label.toLowerCase().includes(query);
    const dim = query && !match;
    const isHover = i===hoverNode;
    ctx.beginPath();
    ctx.arc(p.x,p.y,n.r*Math.sqrt(view.k),0,2*Math.PI);
    ctx.fillStyle = dim? 'rgba(110,118,129,.25)' : col;
    ctx.globalAlpha = dim?0.4:1;
    ctx.fill();
    if(isHover||match){ctx.lineWidth=2;ctx.strokeStyle='#fff';ctx.stroke();}
    ctx.globalAlpha=1;
    // label for hubs / hover / search
    if(n.d>=5 || isHover || match || view.k>1.6){
      ctx.font=(isHover?'600 ':'')+Math.max(10,11)+'px -apple-system,sans-serif';
      ctx.fillStyle = dim?'rgba(139,148,158,.4)':'#e6edf3';
      ctx.textAlign='center';
      const t=n.label.length>22?n.label.slice(0,21)+'…':n.label;
      ctx.fillText(t,p.x,p.y - n.r*Math.sqrt(view.k) - 4);
    }
  }
}

// legend
const lg=document.getElementById('legend');
let html='<b>커뮤니티</b>';
cset.sort((a,b)=>a-b).forEach(c=>{
  html+=`<div class="lg"><span class="dot" style="background:${COLORS[c%COLORS.length]}"></span>${comm[c]||('C'+c)}</div>`;
});
lg.innerHTML=html;

// interaction
function pick(px,py){
  for(let i=nodes.length-1;i>=0;i--){
    const p=toScreen(nodes[i]); const r=nodes[i].r*Math.sqrt(view.k)+3;
    if((px-p.x)**2+(py-p.y)**2<=r*r) return i;
  }
  return null;
}
cv.addEventListener('mousedown',e=>{
  const i=pick(e.offsetX,e.offsetY);
  if(i!=null){dragNode=nodes[i];} else {panning=true;}
  last={x:e.offsetX,y:e.offsetY};
});
window.addEventListener('mousemove',e=>{
  const rect=cv.getBoundingClientRect(); const ox=e.clientX-rect.left, oy=e.clientY-rect.top;
  if(dragNode){const w=fromScreen(ox,oy);dragNode.x=w.x;dragNode.y=w.y;dragNode.vx=0;dragNode.vy=0;}
  else if(panning){view.x+=ox-last.x;view.y+=oy-last.y;last={x:ox,y:oy};}
  else {
    const i=pick(ox,oy); hoverNode=i;
    if(i!=null){const n=nodes[i];
      tip.style.display='block';
      tip.style.left=Math.min(ox+14,W-260)+'px'; tip.style.top=(oy+14)+'px';
      tip.innerHTML=`<div class="t">${n.label}</div><div class="s">${comm[n.c]||('C'+n.c)} · 연결 ${n.d}</div>`;
    } else {tip.style.display='none';}
  }
});
window.addEventListener('mouseup',()=>{dragNode=null;panning=false;});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.12:0.89;
  const mx=e.offsetX-view.x-W/2, my=e.offsetY-view.y-H/2;
  view.x-=mx*(f-1); view.y-=my*(f-1); view.k*=f;
  view.k=Math.max(0.3,Math.min(5,view.k));
},{passive:false});
document.getElementById('search').addEventListener('input',e=>{query=e.target.value.trim().toLowerCase();});

step();
</script>
